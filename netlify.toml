[build]
  # Build command - uses build script
  command = "bash build.sh"
  
  # Directory to publish (where the built files are)
  publish = "public"

[dev]
  # Local dev settings
  framework = "html"
  command = "echo 'Serving from RecipieGenerator/Template'"
  targetPort = 3000

[[redirects]]
  # SPA redirect - send all 404s to index.html
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables for API calls
[context.production.environment]
  REACT_APP_API_URL = "https://food-recipe-api.onrender.com"

[context.preview.environment]
  REACT_APP_API_URL = "https://food-recipe-api.onrender.com"

[context.branch-deploy.environment]
  REACT_APP_API_URL = "https://food-recipe-api.onrender.com"
